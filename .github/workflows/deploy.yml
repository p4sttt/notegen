name: Deploy Site

on:
  repository_dispatch:
    types: [vault-updated]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      VAULT_PATH: ./vault

    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Checkout private vault repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.VAULT_REPO_URL }}
          token: ${{ secrets.VAULT_READ_TOKEN }}
          path: vault

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Sync vault
        run: npm run sync:vault

      - name: Build site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
